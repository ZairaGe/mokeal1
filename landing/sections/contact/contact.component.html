<!-- Contact Section -->
<section class="contact" id="contacto">
  <!-- Left: Info -->
  <div class="contact__info">
    <h2 class="contact__title">Pide tu presupuesto sin compromiso</h2>
    <p class="contact__description">Cuéntanos lo que necesitas y te enviaremos una propuesta a medida en menos de 24 horas.</p>

    <div class="contact__items">
      <div class="contact__item">
        <div class="contact__item-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.58 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.55a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"
            />
          </svg>
        </div>
        <div class="contact__item-text">
          <span class="contact__item-label">Teléfono</span>
          <span class="contact__item-value">+34 692 12 02 09</span>
        </div>
      </div>

      <div class="contact__item">
        <div class="contact__item-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
        </div>
        <div class="contact__item-text">
          <span class="contact__item-label">Email</span>
          <span class="contact__item-value">mokeal.limpiza&#64;gmail.com</span>
        </div>
      </div>

      <div class="contact__item">
        <div class="contact__item-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
        </div>
        <div class="contact__item-text">
          <span class="contact__item-label">Ubicación</span>
          <span class="contact__item-value">Madrid, España</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Form -->
  <div class="contact__form-wrapper">
    <div class="contact__form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre <span class="form-required">*</span></label>
          <input type="text" class="form-input" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label class="form-label">Apellidos <span class="form-required">*</span></label>
          <input type="text" class="form-input" placeholder="Tu apellido" />
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono <span class="form-required">*</span></label>
          <input type="tel" class="form-input" placeholder="600 000 000" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email <span class="form-required">*</span></label>
        <input type="email" class="form-input" placeholder="tu@email.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Servicio de interés</label>
        <div class="form-select-wrapper">
          <select class="form-select">
            <option value="" disabled selected>Selecciona un servicio</option>
            <option value="hogar">Limpieza del hogar</option>
            <option value="oficinas">Oficinas</option>
            <option value="eventos">Eventos</option>
            <option value="postobra">Post-obra</option>
          </select>
          <svg
            class="form-select-arrow"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">¿Cómo nos conociste?</label>
        <div class="form-select-wrapper">
          <select class="form-select">
            <option value="" disabled selected>Selecciona una opción</option>
            <option value="google">Google</option>
            <option value="redes">Redes sociales</option>
            <option value="recomendacion">Recomendación</option>
            <option value="otro">Otro</option>
          </select>
          <svg
            class="form-select-arrow"
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mensaje <span class="form-required">*</span></label>
        <textarea class="form-textarea" placeholder="Cuéntanos qué necesitas..." rows="5"></textarea>
      </div>

      <button class="btn-submit">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
        Enviar solicitud
      </button>
    </div>
  </div>
</section>
